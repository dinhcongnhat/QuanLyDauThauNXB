services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: qlda_nxb
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: "postgresql://postgres:jtsc12345@192.168.1.90:5432/qlda_nxb"
      JWT_SECRET: "Q9qHU+5khmVqKmLNQl8ppQKqT8Gae46Jl3NKrK5FVE0="
      PORT: "4000"
      APP_URL: "https://demo.jtsc.vn"
      ONLYOFFICE_URL: "https://demo.jtsc.vn/onlyoffice"
      ONLYOFFICE_JWT_SECRET: "10122002"
      FILEMAU_PATH: "/app/FileMau"
      MINIO_ENDPOINT: "minio"
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: "jtsc"
      MINIO_SECRET_KEY: "jtsc12345"
      MINIO_BUCKET: "qldanxb"
      VAPID_PUBLIC_KEY: "BPDOLMagUKFkwswo8nhtujQc0myqpZHX44KhZrj4ByllXDy3s5-5B5GpuX5cntgpeAGAJw9X5KFGx5XxJDnNPBA"
      VAPID_PRIVATE_KEY: "S-J3GvryOB0CSAe70w55SHdlmwphtoYhUU2IZPgk7hw"
      VAPID_SUBJECT: "mailto:admin@qlda.vn"
    volumes:
      - ./FileMau:/app/FileMau:ro
    expose:
      - "4000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      onlyoffice:
        condition: service_started
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-01-28T22-35-53Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "jtsc"
      MINIO_ROOT_PASSWORD: "jtsc12345"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped

  onlyoffice:
    image: onlyoffice/documentserver:8.0
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: "10122002"
      JWT_HEADER: "Authorization"
    ports:
      - "8080:80"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: "/api"
    expose:
      - "3000"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  pgdata:
  minio_data:
